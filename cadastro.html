<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 text-white">
  <main class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-10">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(37,99,235,0.22),_transparent_35%),radial-gradient(circle_at_bottom,_rgba(15,23,42,0.95),_rgba(2,6,23,1))]"></div>

    <section class="relative w-full max-w-lg">
      <div class="rounded-[28px] border border-slate-800 bg-slate-950/80 p-6 shadow-2xl shadow-blue-950/30 backdrop-blur sm:p-8">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-blue-600/15 ring-1 ring-blue-600/30">
            <span class="text-2xl font-bold text-blue-500">C</span>
          </div>
          <h1 class="text-3xl font-bold tracking-tight">Criar conta</h1>
          <p class="mt-2 text-sm leading-6 text-slate-400">
            Preencha os campos abaixo para concluir seu cadastro com seguranca.
          </p>
        </div>

        <form id="signupForm" class="space-y-5" novalidate>
          <div>
            <label for="name" class="mb-2 block text-sm font-medium text-slate-400">Nome</label>
            <input
              id="name"
              name="name"
              type="text"
              placeholder="Digite seu nome completo"
              class="field w-full rounded-2xl border border-slate-800 bg-slate-900 px-4 py-3 text-white placeholder-slate-500 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-600/30"
            />
            <p class="error-message mt-2 hidden text-sm text-red-400"></p>
          </div>

          <div>
            <label for="phone" class="mb-2 block text-sm font-medium text-slate-400">Telefone</label>
            <input
              id="phone"
              name="phone"
              type="tel"
              inputmode="numeric"
              maxlength="15"
              placeholder="(11) 99999-9999"
              class="field w-full rounded-2xl border border-slate-800 bg-slate-900 px-4 py-3 text-white placeholder-slate-500 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-600/30"
            />
            <p class="error-message mt-2 hidden text-sm text-red-400"></p>
          </div>

          <div>
            <label for="email" class="mb-2 block text-sm font-medium text-slate-400">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="voce@exemplo.com"
              class="field w-full rounded-2xl border border-slate-800 bg-slate-900 px-4 py-3 text-white placeholder-slate-500 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-600/30"
            />
            <p class="error-message mt-2 hidden text-sm text-red-400"></p>
          </div>

          <div class="grid gap-5 sm:grid-cols-2">
            <div>
              <label for="password" class="mb-2 block text-sm font-medium text-slate-400">Senha</label>
              <input
                id="password"
                name="password"
                type="password"
                placeholder="Minimo 6 caracteres"
                class="field w-full rounded-2xl border border-slate-800 bg-slate-900 px-4 py-3 text-white placeholder-slate-500 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-600/30"
              />
              <p class="error-message mt-2 hidden text-sm text-red-400"></p>
            </div>

            <div>
              <label for="confirmPassword" class="mb-2 block text-sm font-medium text-slate-400">Confirmar senha</label>
              <input
                id="confirmPassword"
                name="confirmPassword"
                type="password"
                placeholder="Repita a senha"
                class="field w-full rounded-2xl border border-slate-800 bg-slate-900 px-4 py-3 text-white placeholder-slate-500 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-600/30"
              />
              <p class="error-message mt-2 hidden text-sm text-red-400"></p>
            </div>
          </div>

          <button
            type="submit"
            class="w-full rounded-2xl bg-blue-600 px-4 py-3 font-semibold text-white transition hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 focus:ring-offset-slate-900"
          >
            Cadastrar
          </button>

          <p id="successMessage" class="hidden rounded-2xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-300">
            Cadastro validado com sucesso.
          </p>
        </form>

        <p class="mt-8 text-center text-sm text-slate-400">
          Ja possui conta?
          <a href="login.html" class="font-medium text-white transition hover:text-blue-600">Voltar para login</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("signupForm");
    const successMessage = document.getElementById("successMessage");
    const phoneInput = document.getElementById("phone");

    const validators = {
      name: (value) => value.trim().length >= 3 || "Informe um nome valido.",
      phone: (value) => value.replace(/\D/g, "").length >= 10 || "Informe um telefone valido.",
      email: (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value) || "Informe um email valido.",
      password: (value) => value.length >= 6 || "A senha deve ter no minimo 6 caracteres.",
      confirmPassword: (value) => value === form.password.value || "As senhas precisam ser iguais."
    };

    function setFieldState(input, message) {
      const error = input.parentElement.querySelector(".error-message");
      const invalid = typeof message === "string";

      input.classList.toggle("border-red-400", invalid);
      input.classList.toggle("focus:border-red-400", invalid);
      input.classList.toggle("focus:ring-red-400/30", invalid);
      input.classList.toggle("border-slate-800", !invalid);

      error.textContent = invalid ? message : "";
      error.classList.toggle("hidden", !invalid);

      return !invalid;
    }

    function validateField(input) {
      const rule = validators[input.name];
      if (!rule) {
        return true;
      }

      const result = rule(input.value);
      return setFieldState(input, result === true ? null : result);
    }

    phoneInput.addEventListener("input", (event) => {
      const digits = event.target.value.replace(/\D/g, "").slice(0, 11);
      const parts = digits.match(/^(\d{0,2})(\d{0,5})(\d{0,4})$/);

      if (!parts) {
        event.target.value = digits;
        return;
      }

      let formatted = "";

      if (parts[1]) {
        formatted = "(" + parts[1];
      }

      if (parts[1] && parts[1].length === 2) {
        formatted += ") ";
      }

      if (parts[2]) {
        formatted += parts[2];
      }

      if (parts[3]) {
        formatted += "-" + parts[3];
      }

      event.target.value = formatted;
    });

    Array.from(form.querySelectorAll(".field")).forEach((input) => {
      input.addEventListener("blur", () => validateField(input));
      input.addEventListener("input", () => {
        if (!input.parentElement.querySelector(".error-message").classList.contains("hidden")) {
          validateField(input);
        }
      });
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      successMessage.classList.add("hidden");

      const inputs = Array.from(form.querySelectorAll(".field"));
      const isValid = inputs.every((input) => validateField(input));

      if (isValid) {
        successMessage.classList.remove("hidden");
        form.reset();
      }
    });
  </script>
</body>
</html>
