<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula-03</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        * { /* esse é um reset css padrão */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .nav .topo{
            padding-top: 20px; /*  espaçamento interno */
            display: flex;
            gap: 20px;
            background-color: yellow;
        }
        .nav .topo .box-input{ 
            background-color: white;            
            border-radius: 8px;
            width: 250px;
        }
        .nav .topo .box-input i{
            padding-top: 2px;
            padding-right: 8px;
            
        }
         input{
            padding: 10px;
            border: none;
            
        }
         input :focus{
            outline: none;
        }
    </style>
 </head>
<body>
    <nav class="nav">
        <div class="topo">
            <img width="100" src="https://admin.cnnbrasil.com.br/wp-content/uploads/sites/12/2021/06/22764_10B614C4CBA4E62D.jpg?w=1200&h=630&crop=1" alt=""/>

            <div class="box-input">
                 <input type="text">
                 <i class="bi bi-search"></i>

            </div>
       </div>
       <div class="footer"></div>
   </nav> 
  </body>
</html>
