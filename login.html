<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 text-white">
  <main class="min-h-screen flex items-center justify-center px-4 py-10">
    <section class="w-full max-w-md">
      <div class="rounded-3xl border border-slate-800 bg-slate-950/70 p-8 shadow-2xl shadow-blue-950/30 backdrop-blur">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-600/15 ring-1 ring-blue-600/30">
            <span class="text-2xl font-bold text-blue-600">L</span>
          </div>
          <h1 class="text-3xl font-bold tracking-tight text-white">Entrar na conta</h1>
          <p class="mt-2 text-sm leading-6 text-slate-400">
            Acesse sua area com seguranca e continue de onde parou.
          </p>
        </div>

        <form class="space-y-5">
          <div>
            <label for="email" class="mb-2 block text-sm font-medium text-slate-400">E-mail</label>
            <input
              id="email"
              type="email"
              placeholder="voce@exemplo.com"
              class="w-full rounded-2xl border border-slate-800 bg-slate-900 px-4 py-3 text-white placeholder-slate-500 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-600/30"
            />
          </div>

          <div>
            <label for="password" class="mb-2 block text-sm font-medium text-slate-400">Senha</label>
            <input
              id="password"
              type="password"
              placeholder="Digite sua senha"
              class="w-full rounded-2xl border border-slate-800 bg-slate-900 px-4 py-3 text-white placeholder-slate-500 outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-600/30"
            />
          </div>

          <div class="flex items-center justify-between gap-4 text-sm">
            <label class="flex items-center gap-2 text-slate-400">
              <input
                type="checkbox"
                class="h-4 w-4 rounded border-slate-700 bg-slate-900 text-blue-600 focus:ring-blue-600"
              />
              Lembrar-me
            </label>
            <a href="#" class="font-medium text-blue-600 transition hover:text-blue-500">
              Esqueceu a senha?
            </a>
          </div>

          <button
            type="submit"
            class="w-full rounded-2xl bg-blue-600 px-4 py-3 font-semibold text-white transition hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 focus:ring-offset-slate-900"
          >
            Entrar
          </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-400">
          Ainda nao tem conta?
          <a href="cadastro.html" class="font-medium text-white transition hover:text-blue-600">Criar conta</a>
        </p>
      </div>
    </section>
  </main>
</body>
</html>
