<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula-01</title>

    <style>
           h1{
                color: red;   /* cor do texto  */
            }       
           input{
                padding: 8px;        /* espaçamento interno do elemento */
                border: 3px solid green;     /* borda do elemento */ 
                border-radius: 9px; /* borda arredondada */
            }
            button {

                padding: 8px; /* espaçamento interno do elemento */ 
                color: #fff;
                border: 3px solid blue;     /* borda do elemento */ 
                background-color: lightblue;
                border-radius: 9px; /* borda arredondada */
            }    
    </style>

</head>
<body>
    <h1>aula 01</h1>
    
<!-- Variações do input type e placeholder -->
<input type="text" placeholder=" Nome Completo"> 
    <button>enviar</button>
    
</body>
</html>
