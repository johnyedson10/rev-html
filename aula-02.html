<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula-02</title>
    <style>
        body {
            margin: 0;
            /*  define a área de margem nos quatro lados do elemento  */
            padding: 0;
            box-sizing: border-box;
            
            display: flex;
            gap: 10px;

        }

        .card {
            width: 250px;
            background-color: azure;
        }

        .card img {
            width: 250px;
            height: 150px;
        }

        .card .description {
            padding: 10px;
            height: 100px;
        }

        .card .description h2 {
            font-size: 18px;
        }

        .card .description p {
            font-size: 14px;
        }

        .card button {
            margin-left: 10px;
            margin-right: 10px;
            width: 90%;
            border: none;
            padding: 10px;
            color: #1d1d1d;
            font-weight: bold;
            background-color: chartreuse;
        }
    </style>

</head>

<body>

    <div class="card">
        <img src="https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcRjVUth02ApLTXZdOu3hfNPTPXqQIg2aUV1B12CqdFUu-7P2I9V6zgzayznbI6LskqeHlNQCH692Am_ozs3zQnpi7NO0DqyDA"
            alt="">
        <div class="Description">
            <h2>Sony Playstation 5 Slim</h2>
            <p2>Sony Playstation 5 Slim Digital Edition De 1 Tb Branco</p2>
        </div>
        <button>comprar</button>
    </div>

    <div class="card">
        <img src="https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcQGyzCHcYMCvhor3cLXh_rNcVnLcbrl5TwO3-cHNw9wj8oi92jCDB9OZUZgsBJlzxksZ5T3zizOhn2DUUOUoegupRg-AUOxWAY2kGyfcPWbV0xAn9JHK8p1Z-o"
            alt="">
        <div class="Description">
            <h2>Smart TV QLED 4K</h2>
            <p>Smart TV QLED 4K Google TV TCL</p>
        </div>
        <button>comprar</button>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/81bzwDLirKL._AC_SX679_.jpg" alt="">
        <div class="Description">
            <h2>Notebook ASUS</h2>
            <p>Notebook ASUS TUF Gaming</p>
        </div>
        <button>comprar</button>
    </div>

</body>

</html>
