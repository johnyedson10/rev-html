<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula-03</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        ** {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* serve para mudar a forma como a 
               largura (width) e a altura (height) de um elemento são calculadas no CSS */
        }

        .Topo3 {

            padding-top: 0;
            display: flex;
            gap: 0;
            background-color: white;
            text-align: center;
            margin-left: 140px;
            color: rgb(74, 87, 81);
            font-family: sans-serif;

        }
    </style>


    <style>
        * {
            margin: 0;
            /* removendo completamente o espaço em branco (margem) ao redor de um elemento*/
            padding: 2px;
            box-sizing: border-box;
        }

        .nav .topo {
            padding-top: 10px;
            /*  espaçamento interno */
            display: flex;
            gap: 10px;
            background-color: red;
        }

        .nav .topo .box-input {
            background-color: white;
            border-radius: 8px;
            height: 65px;
            width: 260px;

        }

        .nav .topo .box-input i {
            padding-top: 2px;
            padding-right: 8px;

        }

        input {
            padding: 20px;
            border: none;

        }

        input :focus {
            outline: none;
        }
    </style>

    <style>
        * {
            margin: 2.4px;
            padding: 1.5px;
            box-sizing: border-box;

        }

        .nav .topo2 {
            padding: top 10px;
            display: flex;
            gap: 46px;
            background-color: rgb(174, 169, 173);
            height: 39px;
            font-family: sans-serif;
            margin-top: 2px;
            color: white;
        }
    </style>

</head>

<body>

    <div class="Topo3">
        <div class="texto">
            <h1>Dia dos Namorados com cupons de até 30% de desconto! Aproveite!</h1>

        </div>
    </div>


    <nav class="nav">
        <div class="topo">
            <img width="70" src="https://essaseoutras.com.br/wp-content/uploads/2012/08/americanas-logo.png" alt="" />

            <div class="box-input">
                <input type="text">
                <i class="bi bi-search"></i>
            </div>
        </div>
        <div class="footer"></div>
    </nav>


    <nav class="nav">
        <div class="topo2">
            <img width="" src="" alt="">

            <div class="texto">
                <p class="texto">baixe o app</p>
            </div>

            <div class="texto">
                <p class="texto">peça seu cartão</p>
            </div>

            <div class="texto">
                <p class="texto">mais vendidos</p>
            </div>
            <div class="texto">
                <p class="texto">nossas lojas</p>
            </div>
            <div class="texto">
                <p class="texto">entrega rápida</p>
            </div>
            <div class="texto">
                <p class="texto">leve+ pague-</p>
            </div>
            <div class="texto">
                <p class="texto">ofertas da tv</p>
            </div>
            <div class="texto">
                <p class="texto">oferta do dia</p>
            </div>

        </div>

        <!--Organiza e estiliza o rodapé de uma página web-->
        <div class="footer"></div>
    </nav>

</body>

</html>
