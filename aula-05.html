<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula-03</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        ** {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* serve para mudar a forma como a 
               largura (width) e a altura (height) de um elemento são calculadas no CSS */
        }

        .nav .Topo3 {

            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            
            padding: 15px 0;
            background-color: white;
            color: rgb(74, 87, 81);
            font-family: sans-serif;


        }
    </style>


    <style>
        * {
            margin: 0;
            /* removendo completamente o espaço em branco (margem) ao redor de um elemento*/
            padding: 2px;
            box-sizing: border-box;
        }

        .nav .topo {
            padding-top: 10px;
            /*  espaçamento interno */
            display: flex;
            gap: 10px;
            background-color: red;
        }

        .nav .topo .box-input {
            background-color: white;
            border-radius: 8px;
            height: 65px;
            width: 260px;

        }

        .nav .topo .box-input i {
            padding-top: 2px;
            padding-right: 8px;

        }

        input {
            padding: 20px;
            border: none;

        }

        input :focus {
            outline: none;
        }
    </style>

    <style>
        * {
            margin: 2.4px;
            padding: 1.5px;
            box-sizing: border-box;

        }

        .nav .topo2 {
            padding: top 10px;
            display: flex;
            gap: 20px;
            background-color: rgb(174, 169, 173);
            height: 39px;
            font-family: sans-serif;
            margin-top: 2px;
            color: white;

            justify-content: center;
            align-items: center;

        }
    </style>

    <style>
        body {
            margin: 0;
            padding: 0;
        }


        *** {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .nav .banner {
            max-width: 1299px;
            width: 100%;
            margin: 0 auto;
            display: block;

        }
    </style>

</head>

<body>
    <nav class="nav">
    <div class="Topo3">
        <div class="texto">
            <h1>Nesse São João temos até 30% de desconto! Aproveite!</h1>

        </div>
    </div>

    <!--  serve para você conseguir aplicar estilos visuais (como cores, fontes e espaçamento)   -->
    <nav class="nav">
        <div class="topo">
            <img width="70" src="https://essaseoutras.com.br/wp-content/uploads/2012/08/americanas-logo.png" alt="" />

            <div class="box-input">
                <input type="text">
                <i class="bi bi-search"></i>
            </div>
        </div>
        <div class="footer"></div>
    </nav>


    <nav class="nav">
        <div class="topo2">
            <img width="" src="" alt="">

            <div class="texto">
                <p class="texto">baixe o app</p>
            </div>

            <div class="texto">
                <p class="texto">peça seu cartão</p>
            </div>

            <div class="texto">
                <p class="texto">mais vendidos</p>
            </div>
            <div class="texto">
                <p class="texto">nossas lojas</p>
            </div>
            <div class="texto">
                <p class="texto">entrega rápida</p>
            </div>
            <div class="texto">
                <p class="texto">leve+ pague-</p>
            </div>
            <div class="texto">
                <p class="texto">ofertas da tv</p>
            </div>
            <div class="texto">
                <p class="texto">oferta do dia</p>
            </div>

        </div>


        <!--Organiza e estiliza o rodapé de uma página web-->
        <div class="footer"></div>
    </nav>

    <nav class=" nav">

        <div class="banner">
            <img width=""
                src="https://americanas.vtexassets.com/assets/vtex.file-manager-graphql/images/b6870565-80ed-4ad6-868e-60fbb18ad2bc___83ab798dfddf2f4678414a2db767290b.png?width=1440&aspect=true&quality=8"
                alt="">


        </div>
    </nav>

</body>

</html>
