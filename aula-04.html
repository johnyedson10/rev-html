<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula-03</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        * { /* esse é um reset css padrão */
            margin: 0px;
            padding: 2px;
            box-sizing: border-box;
        }
        .nav .topo{
            padding-top: 5px; /*  espaçamento interno */
            display: flex;
            gap: 10px;
            background-color: orange;
        }
        .nav .topo .box-input{ 
            background-color: white;            
            border-radius: 8px;           
            height: 59px;
            width: 260px;
        }
        .nav .topo .box-input i{
            padding-top: 2px;
            padding-right: 8px;
            
        }
         input{
            padding: 20px;
            border: none;
            
        }
         input :focus{
            outline: none;
        }
    </style>
 </head>
<body>
    <nav class="nav">
        <div class="topo">
            <img width="100" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQERqZZHIx7YHZ9yf3ZEnKMtxqdg5ZheNlPrA&s" alt=""/>

            <div class="box-input">
                 <input type="text">
                 <i class="bi bi-search"></i>

            </div>
       </div>
       <div class="footer"></div>
   </nav> 
  </body>
</html>
